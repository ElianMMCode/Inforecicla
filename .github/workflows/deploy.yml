name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Django system checks (deploy mode)
        run: |
          source venv/bin/activate
          python manage.py check --deploy --settings=config.settings

      - name: Run tests
        run: |
          source venv/bin/activate
          python manage.py test

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Transfer code to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: '.'
          target: /home/ubuntu/inforecicla_prod/Inforecicla
          strip_components: 0
          excludes: |
            .env
            .git/
            .gitignore
            .github/
            .vscode/
            .idea/
            venv/
            media/
            staticfiles/
            __pycache__/
            *.pyc
            *.pyo
            django_errors.log
            debug_*.py

      - name: Post-deploy — migrations, static, restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd /home/ubuntu/inforecicla_prod/Inforecicla
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            sudo systemctl restart daphne
            echo "Deploy completed successfully."
