<!-- Fragment: Listado Publicaciones -->
<div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 text-primary">Mis Publicaciones</h1>
        <a
           class="btn btn-primary">
            <i class="fas fa-plus-circle"></i> Nueva Publicación
        </a>
    </div>

    <!-- Filtros -->
    <div class="card mb-4">
        <div class="card-body">
            <form method="get" class="row g-3">
                <div class="col-md-4">
                    <label for="estado" class="form-label">Estado</label>
                    <select id="estado" name="estado" class="form-select">
                        <option value="">Todos los estados</option>
                        <option value="publicado">Publicado</option>
                        <option value="borrador">Borrador</option>
                        <option value="archivado">Archivado</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="categoria" class="form-label">Categoría</label>
                    <select id="categoria" name="categoria" class="form-select">
                        <option value="">Todas las categorías</option>
                        <option
                               
                               >Categoría</option>
                    </select>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary me-2">Filtrar</button>
                    <a
                       class="btn btn-outline-secondary">Limpiar</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Tabla de publicaciones -->
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Lista de Publicaciones</h5>
        </div>
        <div class="card-body p-0">
            <div class="text-center text-muted py-5">
                <p>No hay publicaciones creadas.</p>
                <a
                   class="btn btn-primary">Crear Primera Publicación</a>
            </div>

            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Título</th>
                        <th>Categoría</th>
                        <th>Estado</th>
                        <th>Fecha Creación</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td>
                            <strong>Título</strong>
                            <br>
                            <small class="text-muted">Contenido breve...</small>
                        </td>
                        <td>Categoría</td>
                        <td>
                                <span
                                     >Estado</span>
                        </td>
                        <td>Fecha</td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <a
                                   class="btn btn-outline-primary">Ver</a>
                                <a
                                   class="btn btn-outline-warning">Editar</a>
                                <button type="button" class="btn btn-outline-danger"
                                       >Eliminar</button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Paginación -->
        <div class="card-footer">
            <nav aria-label="Paginación de publicaciones">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item">
                        <a class="page-link">Anterior</a>
                    </li>
                    <li
                        class="page-item">
                        <a class="page-link">1</a>
                    </li>
                    <li class="page-item">
                        <a class="page-link">Siguiente</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

    <script>
        function confirmarEliminar(publicacionId) {
            if (confirm('¿Estás seguro de que deseas eliminar esta publicación?')) {
                window.location.href = '/publicaciones/eliminar/' + publicacionId;
            }
        }
    </script>
</div>
