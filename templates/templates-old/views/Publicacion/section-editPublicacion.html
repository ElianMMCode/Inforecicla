<!-- Fragment: Editar Publicación -->
<div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 text-primary">Editar Publicación</h1>
        <a
           class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left"></i> Volver al Listado
        </a>
    </div>

    <div class="card">
        <div class="card-header bg-warning text-dark">
            <h5 class="mb-0">Editando: <span>Título</span></h5>
        </div>
        <div class="card-body">
            <form method="post">
                <div class="row g-3">
                    <!-- Título -->
                    <div class="col-12">
                        <label for="titulo" class="form-label">Título <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="titulo"
                               placeholder="Ingresa el título de la publicación" required maxlength="200">
                        <div class="form-text">Máximo 200 caracteres</div>
                    </div>

                    <!-- Categoría -->
                    <div class="col-md-6">
                        <label for="categoria" class="form-label">Categoría</label>
                        <select class="form-select" id="categoria">
                            <option value="">Selecciona una categoría</option>
                            <option
                                   
                                   >Categoría</option>
                        </select>
                    </div>

                    <!-- Estado -->
                    <div class="col-md-6">
                        <label for="estado" class="form-label">Estado <span class="text-danger">*</span></label>
                        <select class="form-select" id="estado" required>
                            <option value="borrador">Borrador</option>
                            <option value="publicado">Publicado</option>
                            <option value="archivado">Archivado</option>
                        </select>
                    </div>

                    <!-- Contenido -->
                    <div class="col-12">
                        <label for="contenido" class="form-label">Contenido <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="contenido"
                                  rows="10" placeholder="Escribe el contenido de tu publicación..."
                                  required></textarea>
                        <div class="form-text">Puedes usar formato HTML básico si es necesario</div>
                    </div>

                    <!-- Información de fechas -->
                    <div class="col-12">
                        <div class="row text-muted small">
                            <div class="col-md-6">
                                <strong>Creación:</strong> <span>Fecha</span>
                            </div>
                            <div class="col-md-6">
                                <strong>Última actualización:</strong> <span>Fecha</span>
                            </div>
                        </div>
                    </div>

                    <!-- Botones -->
                    <div class="col-12">
                        <div class="d-flex gap-2 justify-content-end">
                            <a
                               class="btn btn-secondary">Cancelar</a>
                            <button type="submit" name="accion" value="guardar_borrador" class="btn btn-warning">
                                Guardar Cambios
                            </button>
                            <button type="submit" name="accion" value="publicar" class="btn btn-success">
                                Actualizar y Publicar
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
