<!-- Fragment: Listado Categorías -->
<section class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-success">Categorías de Material</h2>
        <a class="btn btn-outline-success">Volver al Dashboard</a>
    </div>

    <div class="card border-success">
        <div class="card-header bg-success-subtle border-success">
            <span class="fw-semibold text-success">Gestión de Categorías de Material</span>
        </div>
        <div class="card-body">
            <!-- Formulario de búsqueda -->
            <form class="row g-2 mb-3" method="GET">
                <div class="col-md-10">
                    <input type="text" name="buscar" class="form-control"
                           placeholder="Buscar categoría por nombre...">
                </div>
                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-outline-success">Buscar</button>
                </div>
            </form>

            <!-- Formulario de creación -->
            <form class="row g-2 mb-3" method="POST">
                <div class="col-md-5">
                    <input type="text" class="form-control"
                           placeholder="Nombre de la categoría" required>
                    <div class="invalid-feedback"></div>
                </div>
                <div class="col-md-5">
                    <input type="text" class="form-control"
                           placeholder="Descripción" required>
                    <div class="invalid-feedback"></div>
                </div>
                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-success">Agregar</button>
                </div>
            </form>

            <!-- Tabla de categorías Materiales -->
            <div class="table-responsive">
                <table class="table table-hover m-0">
                    <thead class="table-success">
                    <tr>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Estado</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td>Nombre</td>
                        <td>Descripción</td>
                        <td>
                            <span class="badge bg-success">Activa</span>
                            <span class="badge bg-secondary">Inactiva</span>
                        </td>
                        <td class="text-end">
                            <div class="btn-group btn-group-sm" role="group">
                                <a
                                   class="btn btn-outline-success">Ver</a>
                                <a
                                   class="btn btn-outline-warning">Editar</a>
                                <form method="POST"
                                      style="display:inline;"
                                     >
                                    <button type="submit" class="btn btn-outline-danger">Eliminar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="4" class="text-center text-muted">
                            No se encontraron categorías
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Paginación -->
            <div class="card-footer d-flex justify-content-between align-items-center">
                <span class="small text-success">
                    Mostrando <span>0</span> categorías
                </span>
                <div>
                    <nav>
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item">
                                <a class="page-link">Primera</a>
                            </li>
                            <li class="page-item">
                                <a class="page-link">Anterior</a>
                            </li>

                            <li
                                class="page-item">
                                <a class="page-link"
                                  >1</a>
                            </li>

                            <li class="page-item">
                                <a class="page-link">Siguiente</a>
                            </li>
                            <li class="page-item">
                                <a class="page-link">Última</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</section>
