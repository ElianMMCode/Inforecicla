<!-- Fragment: Detalle Material -->
<section class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-success">
            <i class="fas fa-box me-2"></i>Detalle del Material
        </h2>
        <a class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i>Volver al Dashboard
        </a>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card border-success">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">Nombre del Material</h5>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <strong class="text-success">Descripción:</strong>
                            <p class="mt-1">Descripción</p>
                        </div>
                        <div class="col-md-6">
                            <strong class="text-success">Estado:</strong>
                            <span class="badge bg-success">Activo</span>
                            <span class="badge bg-secondary">Inactivo</span>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <strong class="text-success">Categoría:</strong>
                            <p class="badge bg-info text-white mt-1"></p>
                            <span class="text-muted">Sin categoría</span>
                        </div>
                        <div class="col-md-6">
                            <strong class="text-success">Tipo:</strong>
                            <p class="badge bg-warning text-dark mt-1"></p>
                            <span class="text-muted">Sin tipo</span>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-12">
                            <strong class="text-success">Imagen:</strong>
                            <div class="mt-2">
                                <img alt="Imagen del material"
                                     class="img-thumbnail" style="max-height: 200px;">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card border-info">
                <div class="card-header bg-info text-white">
                    <h6 class="mb-0">Información Adicional</h6>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <strong class="text-success">ID:</strong>
                        <p class="font-monospace small">ID</p>
                    </div>
                    <div class="mb-3">
                        <strong class="text-success">Fecha de creación:</strong>
                        <p>Fecha</p>
                    </div>
                    <div class="mb-3">
                        <strong class="text-success">Última actualización:</strong>
                        <p>Fecha</p>
                    </div>
                </div>
            </div>

            <div class="card border-warning mt-3">
                <div class="card-body text-center">
                    <a class="btn btn-warning btn-sm me-2">
                        <i class="fas fa-edit me-1"></i>Editar
                    </a>
                    <form method="POST"
                          class="d-inline" onsubmit="return confirm('¿Está seguro de eliminar este material?')">
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            <i class="fas fa-trash me-1"></i>Eliminar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
