<!-- Fragment: Listado Usuarios -->
<section class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-dark">
            <i class="fas fa-users me-2"></i>Listado de Usuarios
        </h2>
        <a class="btn btn-dark">
            <i class="fas fa-user-plus me-2"></i>Nuevo Usuario
        </a>
    </div>

    <!-- Filtros de búsqueda -->
    <div class="card border-dark mb-3">
        <div class="card-body">
            <form class="row g-2" method="GET">
                <div class="col-12 col-md">
                    <label class="form-label text-dark">Buscar</label>
                    <input class="form-control" name="buscar"
                           placeholder="nombre, correo…">
                </div>
                <div class="col-6 col-md-3">
                    <label class="form-label text-dark">Rol</label>
                    <select class="form-select" name="rol">
                        <option value="">Todos</option>
                        <option value="Administrador">Administrador</option>
                        <option value="GestorECA">Gestor ECA</option>
                        <option value="Ciudadano">Ciudadano</option>
                    </select>
                </div>
                <div class="col-6 col-md-3">
                    <label class="form-label text-dark">Estado</label>
                    <select class="form-select" name="estado">
                        <option value="">Todos</option>
                        <option value="activo">Activo</option>
                        <option value="inactivo">Inactivo</option>
                        <option value="bloqueado">Bloqueado</option>
                    </select>
                </div>
                <div class="col-12 col-md-auto d-flex align-items-end">
                    <button class="btn btn-dark" type="submit">
                        <i class="fas fa-filter me-1"></i>Aplicar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Tabla de usuarios -->
    <div class="card border-dark">
        <div class="card-header bg-dark text-white">
            <h6 class="mb-0">
                <i class="fas fa-list me-2"></i>Usuarios del Sistema
            </h6>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle m-0">
                <thead class="table-dark">
                <tr>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th>Registro</th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="me-2">
                                <img alt="Avatar"
                                     class="rounded-circle" style="width: 32px; height: 32px;">
                            </div>
                            <div class="me-2">
                                <div class="bg-light rounded-circle d-flex align-items-center justify-content-center"
                                     style="width: 32px; height: 32px;">
                                    <i class="fas fa-user text-muted"></i>
                                </div>
                            </div>
                            <div>
                                <strong>Nombre</strong>
                                <div class="small text-muted"
                                    >@usuario</div>
                            </div>
                        </div>
                    </td>
                    <td>correo@ejemplo.com</td>
                    <td>
                            <span class="badge">
                                <span class="badge bg-danger">Administrador</span>
                                <span class="badge bg-info">Gestor ECA</span>
                                <span class="badge bg-success">Ciudadano</span>
                            </span>
                    </td>
                    <td>
                            <span class="badge">
                                <span class="badge bg-success">Activo</span>
                                <span class="badge bg-warning">Inactivo</span>
                                <span class="badge bg-danger">Bloqueado</span>
                            </span>
                    </td>
                    <td>
                        <small>01/01/2024</small>
                    </td>
                    <td class="text-end">
                        <div class="btn-group btn-group-sm" role="group">
                            <a
                               class="btn btn-outline-dark">
                                <i class="fas fa-eye"></i>
                            </a>
                            <a
                               class="btn btn-outline-warning">
                                <i class="fas fa-edit"></i>
                            </a>
                            <form method="POST"
                                  class="d-inline"
                                  onsubmit="return confirm('¿Está seguro de eliminar este usuario?')">
                                <button type="submit" class="btn btn-outline-danger">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td colspan="6" class="text-center text-muted py-4">
                        <i class="fas fa-inbox fa-2x mb-2 d-block"></i>
                        No se encontraron usuarios
                        <div class="mt-2">
                            <a class="btn btn-dark btn-sm">
                                <i class="fas fa-user-plus me-1"></i>Crear primer usuario
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Paginación -->
        <div class="card-footer d-flex justify-content-between align-items-center">
            <span class="small text-dark">
                Mostrando <span>0</span> usuarios
                <span> para "<span></span>"</span>
            </span>
            <div>
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item">
                            <a class="page-link"
                              >
                                <i class="fas fa-angle-double-left"></i>
                            </a>
                        </li>
                        <li class="page-item">
                            <a class="page-link"
                              >
                                <i class="fas fa-angle-left"></i>
                            </a>
                        </li>

                        <li
                            class="page-item">
                            <a class="page-link"
                              
                              >1</a>
                        </li>

                        <li class="page-item">
                            <a class="page-link"
                              >
                                <i class="fas fa-angle-right"></i>
                            </a>
                        </li>
                        <li class="page-item">
                            <a class="page-link"
                              >
                                <i class="fas fa-angle-double-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</section>
