{% load static %}{% if request.user.is_authenticated and not request.user.completo_tutorial %}
{% include 'partials/_tutorial_assets.html' %}
<script src="{% static 'js/tutorial_helpers.js' %}"></script>
<script>
(function() {
    var q = new URLSearchParams(globalThis.location.search);
    if (q.get('reiniciar') === '1') {
        STORAGE_KEYS.forEach(function(k) { storageRemove(k); });
        globalThis.history.replaceState({}, '', '/perfil/');
    }
    var tab = '{{ tab_activo|default:"datos" }}';
    var key = 'tutorial_ciu_' + tab;

    function buildComentariosSteps() {
        var s = [];
        var lista = document.getElementById('comentarios-lista');
        if (lista) {
            s.push({ element: '#comentarios-lista', popover: { title: 'Tus Comentarios', description: 'Acá se listan todos los comentarios que publicaste en las noticias de InfoRecicla.', side: 'bottom' } });
            var link = lista.querySelector('a[href*="detalle_publicacion"]');
            if (link && link.id)
                s.push({ element: '#' + link.id, popover: { title: 'Ver Publicación', description: 'Clickeá para ir directamente a la publicación que comentaste.', side: 'bottom' } });
        }
        var emptyLink = document.getElementById('btn-ver-publicaciones-comentarios');
        if (emptyLink && !lista)
            s.push({ element: '#btn-ver-publicaciones-comentarios', popover: { title: 'Sin Comentarios', description: 'Todavía no comentaste ninguna publicación. ¡Empezá explorando las novedades!', side: 'bottom' } });
        return s;
    }

    function buildChatSteps() {
        var s = pasosDesdeConfig({{ tutorial_chat_steps|safe }});
        var sendBtn = document.querySelector('#chat-form button[type="submit"]');
        if (sendBtn) s.push({ element: '#chat-form', popover: { title: 'Enviar Mensaje', description: 'Presioná este botón o Enter para enviar tu mensaje al punto ECA.', side: 'left' } });
        return s;
    }

    function buildSteps(currentTab) {
        if (currentTab === 'datos') return pasosDesdeConfig({{ tutorial_datos_steps|safe }});
        if (currentTab === 'comentarios') return buildComentariosSteps();
        if (currentTab === 'chat') return buildChatSteps();
        if (currentTab === 'guardados') {
            var st = pasosDesdeConfig({{ tutorial_guardados_steps|safe }});
            var grid = document.getElementById('guardados-grid');
            if (grid) {
                st.push({ element: '#guardados-grid', popover: { title: 'Tus Guardados', description: 'Publicaciones que guardaste. Clickeá "Leer publicación" para verlas completas.', side: 'top' } });
            } else {
                var emptyLink2 = document.getElementById('btn-explorar-publicaciones-vacio');
                if (emptyLink2) st.push({ element: '#btn-explorar-publicaciones-vacio', popover: { title: 'Sin Guardados', description: 'Todavía no guardaste publicaciones. Explorá y guardá las que te interesen.', side: 'bottom' } });
            }
            return st;
        }
        return [];
    }

    if (storageGet(key) !== '1') {
        document.addEventListener('DOMContentLoaded', function() {
            var steps = buildSteps(tab);
            if (steps.length) storageSet(key, '1');
            iniciarTutorial(steps);
        });
    }
})();
</script>
{% endif %}
