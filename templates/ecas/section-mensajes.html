{% load static %}
<div class="container-fluid p-0">

  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div>
      <h4 class="fw-bold text-success mb-0"><i class="bi bi-chat-dots-fill me-2"></i>Mensajes de Ciudadanos</h4>
      <small class="text-muted">Responde directamente a los ciudadanos que se han contactado contigo.</small>
    </div>
  </div>

  <!-- Panel principal -->
  <div class="card border-0 shadow-sm" style="border-radius: 12px; overflow: hidden;">
    <div class="row g-0" style="height: 440px;">

      <!-- Columna izquierda: lista de chats -->
      <div class="col-12 col-md-4 border-end d-flex flex-column" style="height: 440px;">
        <div class="px-3 py-3 border-bottom" style="background: #f8faf9;">
          <h6 class="fw-bold mb-0 text-success">
            <i class="bi bi-people-fill me-2"></i>Conversaciones
          </h6>
        </div>
        <div id="chat-sidebar-eca" class="flex-grow-1" style="overflow-y: auto;">
          <div class="skeleton skeleton-sidebar-item" style="margin:8px 12px;"></div>
          <div class="skeleton skeleton-sidebar-item" style="margin:4px 12px;"></div>
          <div class="skeleton skeleton-sidebar-item" style="margin:4px 12px;"></div>
          <div class="skeleton skeleton-sidebar-item" style="margin:4px 12px;"></div>
        </div>
      </div>

      <!-- Columna derecha: mensajes + input -->
      <div class="col-12 col-md-8 d-flex flex-column" style="height: 440px;">
        <!-- Cabecera del chat activo -->
        <div class="px-4 py-3 border-bottom d-flex align-items-center gap-3" style="background: #f8faf9;">
          <div class="rounded-circle bg-success d-flex align-items-center justify-content-center flex-shrink-0" style="width:38px;height:38px;">
            <i class="bi bi-person-fill text-white" style="font-size:.9rem;"></i>
          </div>
          <span class="fw-semibold text-success" id="chat-titulo-ciudadano">
            Selecciona una conversación
          </span>
        </div>

        <!-- Área de mensajes -->
        <div id="chat-mensajes-eca" class="flex-grow-1 p-3 d-flex flex-column gap-2" style="overflow-y: auto; background: #f8faf9;">
          <div class="text-center text-muted my-auto small">
            <i class="bi bi-arrow-left-circle me-1"></i>Selecciona una conversación para ver los mensajes
          </div>
        </div>

        <!-- Input de envío -->
        <div class="p-3 border-top bg-white">
          <form id="chat-form-eca" class="d-flex flex-column gap-1">
            {% csrf_token %}
            <div class="d-flex align-items-end gap-2">
              <textarea id="chat-input-eca" class="form-control chat-textarea"
                        placeholder="Escribe tu respuesta..." maxlength="500" rows="1"
                        style="border-radius: 16px; border-color: #d0ead8;"></textarea>
              <button type="submit" class="btn btn-success d-flex align-items-center justify-content-center flex-shrink-0"
                      style="width:40px;height:40px;padding:0;border-radius:50%;">
                <i class="bi bi-send-fill"></i>
              </button>
            </div>
            <div class="d-flex align-items-center gap-2 px-1">
              <small class="text-muted chat-input-hint">Enter para enviar, Shift+Enter para nueva línea</small>
              <small class="text-muted ms-auto chat-char-count" id="chat-char-count-eca">0/500</small>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>

<style>
  .chat-bubble {
    padding: 0.65rem 1rem;
    border-radius: 1.1rem;
    max-width: 72%;
    word-break: break-word;
    font-size: .9rem;
    line-height: 1.4;
  }
  .bubble-ciudadano {
    background: #fff;
    color: #333;
    border-bottom-left-radius: 0.25rem;
    border: 1px solid #e5e5e5;
    align-self: flex-start;
  }
  .bubble-punto {
    background: linear-gradient(135deg, #d2f4e5 0%, #afe6ce 100%);
    color: #146c43;
    border-bottom-right-radius: 0.25rem;
    align-self: flex-end;
  }
  .chat-meta {
    font-size: 0.7rem;
    opacity: 0.65;
    margin-top: 3px;
  }
  .chat-sidebar-item-eca {
    border-bottom: 1px solid #f0f0f0;
    padding: .75rem 1rem;
    cursor: pointer;
    transition: background .15s;
  }
  .chat-sidebar-item-eca:hover { background-color: #f0faf5; }
  .chat-sidebar-item-eca.active {
    background-color: #eafff2;
    border-left: 4px solid #198754;
  }
  #chat-mensajes-eca::-webkit-scrollbar { width: 5px; }
  #chat-mensajes-eca::-webkit-scrollbar-thumb { background: #d0ead8; border-radius: 10px; }
  .chat-bubble.msg-group-continue { margin-top: 1px !important; }
  .chat-bubble.msg-group-continue .chat-meta { display: none; }
  @keyframes chatFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .chat-bubble.msg-animate { animation: chatFadeIn .25s ease-out; }
  .date-separator {
    display: flex; align-items: center; gap: .5rem;
    padding: .5rem 0; margin: .25rem 0;
    font-size: .68rem; font-weight: 600; color: #6b7d6b; text-transform: uppercase;
    letter-spacing: .3px;
  }
  .date-separator::before, .date-separator::after {
    content: ''; flex: 1; height: 1px; background: #dce4dc;
  }
  @keyframes skeletonShimmer {
    0% { background-position: -200px 0; }
    100% { background-position: 200px 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, #e9f0ec 25%, #dce8e1 50%, #e9f0ec 75%);
    background-size: 200px 100%;
    animation: skeletonShimmer 1.5s ease-in-out infinite;
    border-radius: 8px;
  }
  .skeleton-bubble { height: 36px; margin-bottom: 10px; border-radius: 1.1rem; }
  .skeleton-bubble.sk-right { width: 65%; margin-left: auto; }
  .skeleton-bubble.sk-left { width: 55%; }
  .skeleton-bubble.sk-wide { width: 80%; }
  .skeleton-bubble.sk-narrow { width: 40%; }
  .skeleton-sidebar-item { height: 50px; margin: 4px 12px; border-radius: 12px; }
  .chat-empty-state, .chat-error-state { max-width: 280px; margin: 0 auto; }
  .chat-textarea {
    resize: none; overflow-y: hidden; min-height: 38px; max-height: 120px;
    line-height: 1.5; padding: 8px 14px; font-size: .9rem;
  }
  .chat-char-count { font-size: .68rem; min-width: 42px; text-align: right; }
  .chat-input-hint { font-size: .68rem; }
  .chat-bubble.msg-sending { opacity: 0.7; }
  .chat-bubble.msg-sending .msg-send-status { font-size: .65rem; color: #888; font-style: italic; }
  .chat-bubble.msg-failed { opacity: 0.7; border-color: #dc3545 !important; background: #fff5f5 !important; }
  .chat-bubble.msg-failed .msg-send-status { font-size: .65rem; color: #dc3545; cursor: pointer; }
  .chat-bubble.msg-failed .msg-retry-btn { font-size: .65rem; color: #dc3545; cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline; }
</style>

<script>
  // ID del gestor actual para distinguir burbujas
  window.GESTOR_USER_ID = '{{ request.user.id }}';
  let currentChatIdEca = null;
  let currentCiudadanoNombre = '';

  // --- Utilidades de formato ---
  function formatRelativeTime(isoString) {
    if (!isoString) return '';
    const now = new Date(), date = new Date(isoString);
    const s = Math.floor((now - date) / 1000);
    if (s < 10) return 'ahora';
    if (s < 60) return 'hace ' + s + 's';
    const m = Math.floor(s / 60);
    if (m < 60) return 'hace ' + m + ' min';
    const h = Math.floor(m / 60);
    if (h < 24) return 'hace ' + h + 'h';
    const d = Math.floor(h / 24);
    if (d === 1) return 'ayer';
    return date.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' });
  }
  function getDateKey(isoString) {
    if (!isoString) return '';
    var d = new Date(isoString);
    return d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
  }
  function getMinutesDiff(isoA, isoB) {
    if (!isoA || !isoB) return Infinity;
    return Math.abs(new Date(isoA) - new Date(isoB)) / 60000;
  }

  // --- Skeleton loaders ---
  function showSkeletonSidebar(container) {
    var html = '';
    for (var i = 0; i < 4; i++) { html += '<div class="skeleton skeleton-sidebar-item"></div>'; }
    container.innerHTML = html;
  }
  function showSkeletonMessages(container) {
    container.innerHTML =
      '<div class="skeleton skeleton-bubble sk-left" style="width:55%;"></div>' +
      '<div class="skeleton skeleton-bubble sk-left sk-wide" style="width:70%;height:60px;"></div>' +
      '<div class="skeleton skeleton-bubble sk-right" style="width:65%;"></div>' +
      '<div class="skeleton skeleton-bubble sk-right sk-narrow" style="width:45%;"></div>' +
      '<div class="skeleton skeleton-bubble sk-left" style="width:50%;height:24px;"></div>' +
      '<div class="skeleton skeleton-bubble sk-right" style="width:60%;height:48px;"></div>';
  }

  // ----- Cargar lista de chats -----
  function cargarChatsEca() {
    fetch('/punto-eca/mensajes/chats/', { credentials: 'same-origin' })
      .then(r => r.json())
      .then(data => {
        const sidebar = document.getElementById('chat-sidebar-eca');
        if (!Array.isArray(data) || !data.length) {
          sidebar.innerHTML = `
            <div class="text-center text-muted py-5 px-3">
              <div class="bg-success-subtle rounded-circle d-inline-flex align-items-center justify-content-center mb-2" style="width:48px;height:48px;">
                <i class="bi bi-chat-dots text-success" style="font-size:1.4rem;"></i>
              </div>
              <p class="mb-0 small">Aún no tienes conversaciones.</p>
            </div>`;
          return;
        }
        sidebar.innerHTML = data.map(chat => `
          <div class="chat-sidebar-item-eca d-flex align-items-center gap-3 ${String(chat.id) === String(currentChatIdEca) ? 'active' : ''}"
               data-chat-id="${chat.id}" data-ciudadano-id="${chat.ciudadano}"
               data-ciudadano-nombre="${chat.ciudadano_nombre || 'Ciudadano'}" role="button">
            <div class="rounded-circle bg-success d-flex align-items-center justify-content-center flex-shrink-0"
                 style="width:38px;height:38px;">
              <i class="bi bi-person-fill text-white" style="font-size:.9rem;"></i>
            </div>
            <div class="flex-grow-1 overflow-hidden">
              <div class="fw-semibold small text-truncate">${chat.ciudadano_nombre || 'Ciudadano'}</div>
              <div class="text-muted" style="font-size:.7rem;">${chat.created_at ? new Date(chat.created_at).toLocaleDateString('es-ES') : ''}</div>
            </div>
          </div>
        `).join('');

        sidebar.querySelectorAll('[data-chat-id]').forEach(item => {
          item.addEventListener('click', function () {
            sidebar.querySelectorAll('[data-chat-id]').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            currentChatIdEca = item.dataset.chatId;
            currentCiudadanoNombre = item.dataset.ciudadanoNombre;
            document.getElementById('chat-titulo-ciudadano').textContent = currentCiudadanoNombre;
            cargarMensajesEca(currentChatIdEca);
          });
        });
      })
      .catch(() => {
        document.getElementById('chat-sidebar-eca').innerHTML =
          '<div class="chat-error-state text-center py-4"><div class="text-danger small mb-2"><i class="bi bi-exclamation-triangle me-1"></i>Error al cargar conversaciones.</div><button class="btn btn-outline-success btn-sm" onclick="cargarChatsEca()"><i class="bi bi-arrow-repeat me-1"></i>Reintentar</button></div>';
      });
  }

  // --- Estado global ---
  let currentWSEca = null;

  // ----- Cargar mensajes del chat, setup WS -----
  function cargarMensajesEca(chatId) {
    cerrarWSEca();
    const panel = document.getElementById('chat-mensajes-eca');
    showSkeletonMessages(panel);
    fetch(`/mensajes/${chatId}/mensajes/`, { credentials: 'same-origin' })
      .then(r => r.json())
      .then(msgs => {
        renderMensajesEca(msgs);
        marcarLeidosEca(chatId);
        iniciarWSEca(chatId);
      })
      .catch(() => {
        panel.innerHTML = '<div class="chat-error-state text-center py-4"><div class="text-danger small mb-2"><i class="bi bi-exclamation-triangle me-1"></i>Error al cargar mensajes.</div><button class="btn btn-outline-success btn-sm" onclick="cargarMensajesEca(\'' + chatId + '\')"><i class="bi bi-arrow-repeat me-1"></i>Reintentar</button></div>';
      });
  }

  // --- WebSocket realtime con reconexion ---
  var _wsEcaUrl = null;
  var _wsEcaReconnectAttempt = 0;
  var _wsEcaShouldReconnect = false;

  function iniciarWSEca(chatId) {
    cerrarWSEca();
    const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
    _wsEcaUrl = protocol + '://' + window.location.host + '/ws/chat/' + chatId + '/';
    _wsEcaReconnectAttempt = 0;
    _wsEcaShouldReconnect = true;
    _connectWSEca();
  }

  function _connectWSEca() {
    if (!_wsEcaUrl) return;
    currentWSEca = new WebSocket(_wsEcaUrl);
    currentWSEca.onmessage = function(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.message) {
          if (String(data.user_id) === String(window.GESTOR_USER_ID)) {
            removerBurbujasPendientesEca();
          }
          anadirMensajeRealtimeEca({
            texto: data.message,
            remitente: data.user_id,
            enviado_en: new Date().toISOString()
          });
        }
      } catch (e) { /* ignore */ }
    };
    currentWSEca.onclose = function() {
      currentWSEca = null;
      if (_wsEcaShouldReconnect) {
        _wsEcaReconnectAttempt++;
        var delay = Math.min(1000 * Math.pow(2, _wsEcaReconnectAttempt), 30000);
        setTimeout(_connectWSEca, delay);
      }
    };
  }

  function cerrarWSEca() {
    _wsEcaShouldReconnect = false;
    if (currentWSEca) {
      try { currentWSEca.close(); } catch(e){}
      currentWSEca = null;
    }
  }

  function removerBurbujasPendientesEca() {
    var panel = document.getElementById('chat-mensajes-eca');
    var pendientes = panel.querySelectorAll('.msg-sending, .msg-failed');
    pendientes.forEach(function(el) { el.closest('.msg-wrapper').remove(); });
  }

  function crearBurbujaOptimistaEca(texto) {
    var panel = document.getElementById('chat-mensajes-eca');
    if (panel.querySelector('.no-mensajes-placeholder')) panel.innerHTML = '';
    removerBurbujasPendientesEca();
    var wrapper = document.createElement('div');
    wrapper.className = 'd-flex justify-content-end mb-0 msg-wrapper';
    wrapper.dataset.dateKey = getDateKey(new Date().toISOString());
    wrapper.innerHTML = `
      <div class="chat-bubble bubble-punto msg-sending msg-animate">
        <div class="mensaje-texto">${texto}</div>
        <div class="chat-meta d-flex align-items-center gap-2 mt-1">
          <span class="fw-semibold msg-meta-name">Tú</span>
          <span class="msg-send-status"><i class="bi bi-clock me-1"></i>enviando...</span>
        </div>
      </div>`;
    panel.appendChild(wrapper);
    panel.scrollTop = panel.scrollHeight;
    return wrapper;
  }

  function marcarOptimistaFallidoEca(wrapper) {
    var bubble = wrapper.querySelector('.chat-bubble');
    if (!bubble) return;
    bubble.classList.remove('msg-sending');
    bubble.classList.add('msg-failed');
    bubble.style.border = '1px solid #dc3545';
    var status = bubble.querySelector('.msg-send-status');
    if (status) status.innerHTML = '<button class="msg-retry-btn" onclick="this.closest(\'.msg-wrapper\').remove(); document.getElementById(\'chat-form-eca\').querySelector(\'button[type=submit]\').click();"><i class="bi bi-exclamation-circle me-1"></i>falló &mdash; reintentar</button>';
  }
  function anadirMensajeRealtimeEca(mensaje) {
    const panel = document.getElementById('chat-mensajes-eca');
    if (panel.querySelector('.no-mensajes-placeholder')) panel.innerHTML = '';
    const remitenteStr = mensaje.remitente ? String(mensaje.remitente) : '';
    const gestorIdStr = String(window.GESTOR_USER_ID);
    const esGestor = remitenteStr && remitenteStr === gestorIdStr;
    const bubbleClass = esGestor ? 'bubble-punto' : 'bubble-ciudadano';
    const justify = esGestor ? 'justify-content-end' : 'justify-content-start';
    const nombreLabel = esGestor ? 'Tú' : (currentCiudadanoNombre || 'Ciudadano');
    const fecha = mensaje.enviado_en ? new Date(mensaje.enviado_en).toISOString() : '';

    const allWrappers = panel.querySelectorAll('.msg-wrapper');
    const lastWrapper = allWrappers.length ? allWrappers[allWrappers.length - 1] : null;
    const thisDateKey = getDateKey(fecha);
    const lastDateKey = lastWrapper ? lastWrapper.dataset.dateKey : null;

    if (lastDateKey && thisDateKey && lastDateKey !== thisDateKey) {
      const sep = document.createElement('div');
      sep.className = 'date-separator';
      var d = new Date(fecha);
      var today = new Date(), thatDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      var dayDiff = Math.floor((new Date(today.getFullYear(), today.getMonth(), today.getDate()) - thatDay) / 86400000);
      sep.textContent = dayDiff === 0 ? 'Hoy' : dayDiff === 1 ? 'Ayer' : d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
      panel.appendChild(sep);
    }

    var isGrouped = false;
    if (lastWrapper) {
      var lastBubble = lastWrapper.querySelector('.chat-bubble');
      if (lastBubble) {
        var lastRmt = lastBubble.dataset.remitente;
        var lastTs = lastBubble.dataset.enviadoEn;
        if (lastRmt === remitenteStr && getMinutesDiff(lastTs, fecha) < 2) {
          isGrouped = true;
        }
      }
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'd-flex ' + justify + ' mb-0 msg-wrapper';
    wrapper.dataset.dateKey = thisDateKey;
    wrapper.innerHTML = `
      <div class="chat-bubble ${bubbleClass} msg-animate${isGrouped ? ' msg-group-continue' : ''}"
           data-remitente="${remitenteStr}" data-enviado-en="${fecha}">
        <div class="mensaje-texto">${mensaje.texto}</div>
        <div class="chat-meta d-flex align-items-center gap-2 mt-1">
          <span class="fw-semibold msg-meta-name">${nombreLabel}</span>
          <span class="text-muted">${formatRelativeTime(fecha)}</span>
        </div>
      </div>`;
    panel.appendChild(wrapper);
    panel.scrollTop = panel.scrollHeight;
  }

  // ----- Renderizar mensajes -----
  function renderMensajesEca(mensajes) {
    const panel = document.getElementById('chat-mensajes-eca');
    if (!Array.isArray(mensajes) || !mensajes.length) {
      panel.innerHTML = `
        <div class="text-center text-muted my-auto small no-mensajes-placeholder">
          <i class="bi bi-chat me-1"></i>Aún no hay mensajes en esta conversación.
        </div>`;
      return;
    }
    panel.innerHTML = '';
    var lastDateKey = null;
    mensajes.forEach(function(msg, i) {
      var esGestor = String(msg.remitente) === String(window.GESTOR_USER_ID);
      var bubbleClass = esGestor ? 'bubble-punto' : 'bubble-ciudadano';
      var justify = esGestor ? 'justify-content-end' : 'justify-content-start';
      var nombreLabel = esGestor ? 'Tú' : (msg.remitente_nombre || currentCiudadanoNombre || 'Ciudadano');
      var editadoBadge = msg.editado ? '<span class="text-muted ms-1" style="font-size:.65rem;">(editado)</span>' : '';
      var timestamp = msg.enviado_en ? formatRelativeTime(msg.enviado_en) : '';

      var thisDateKey = getDateKey(msg.enviado_en);
      if (lastDateKey && thisDateKey && lastDateKey !== thisDateKey) {
        var sep = document.createElement('div');
        sep.className = 'date-separator';
        var d = new Date(msg.enviado_en);
        var today = new Date();
        var thatDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
        var dayDiff = Math.floor((new Date(today.getFullYear(), today.getMonth(), today.getDate()) - thatDay) / 86400000);
        sep.textContent = dayDiff === 0 ? 'Hoy' : dayDiff === 1 ? 'Ayer' : d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
        panel.appendChild(sep);
      }
      lastDateKey = thisDateKey;

      var isGrouped = false;
      if (i > 0) {
        var prev = mensajes[i - 1];
        if (String(prev.remitente) === String(msg.remitente) && getMinutesDiff(prev.enviado_en, msg.enviado_en) < 2) {
          isGrouped = true;
        }
      }

      var wrapper = document.createElement('div');
      wrapper.className = 'd-flex ' + justify + ' mb-0 msg-wrapper';
      wrapper.dataset.dateKey = thisDateKey;
      wrapper.innerHTML = `
        <div class="chat-bubble ${bubbleClass} msg-animate${isGrouped ? ' msg-group-continue' : ''}" data-msg-id="${msg.id}" data-remitente="${msg.remitente || ''}" data-enviado-en="${msg.enviado_en || ''}">
          <div class="mensaje-texto">${msg.texto}</div>
          <div class="chat-meta d-flex align-items-center gap-2 mt-1">
            <span class="fw-semibold msg-meta-name">${nombreLabel}</span>
            <span class="text-muted">${timestamp}</span>
            ${editadoBadge}
            ${esGestor ? `<button class="btn-editar-msg btn btn-link p-0 ms-1" data-msg-id="${msg.id}" data-texto="${msg.texto.replace(/"/g,'&quot;')}" title="Editar" style="font-size:.75rem;color:#198754;line-height:1;">
              <i class="bi bi-pencil-fill"></i>
            </button>` : ''}
          </div>
          <div class="form-editar-msg d-none mt-2">
            <div class="d-flex gap-1">
              <input type="text" class="form-control form-control-sm input-editar" value="${msg.texto.replace(/"/g,'&quot;')}" maxlength="500" style="border-radius:12px;">
              <button class="btn btn-success btn-sm btn-confirmar-edicion px-2" style="border-radius:50%;width:32px;height:32px;padding:0;"><i class="bi bi-check-lg"></i></button>
              <button class="btn btn-secondary btn-sm btn-cancelar-edicion px-2" style="border-radius:50%;width:32px;height:32px;padding:0;"><i class="bi bi-x-lg"></i></button>
            </div>
          </div>
        </div>`;

      if (esGestor) {
        var bubble = wrapper.querySelector('.chat-bubble');
        var btnEditar = wrapper.querySelector('.btn-editar-msg');
        var formEditar = wrapper.querySelector('.form-editar-msg');
        var inputEditar = wrapper.querySelector('.input-editar');
        var btnConfirmar = wrapper.querySelector('.btn-confirmar-edicion');
        var btnCancelar = wrapper.querySelector('.btn-cancelar-edicion');

        btnEditar.addEventListener('click', function() {
          formEditar.classList.remove('d-none');
          inputEditar.focus();
        });
        btnCancelar.addEventListener('click', function() { formEditar.classList.add('d-none'); });
        btnConfirmar.addEventListener('click', function() { editarMensaje(msg.id, inputEditar, bubble, formEditar); });
        inputEditar.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') editarMensaje(msg.id, inputEditar, bubble, formEditar);
          if (e.key === 'Escape') formEditar.classList.add('d-none');
        });
      }

      panel.appendChild(wrapper);
    });
    panel.scrollTop = panel.scrollHeight;
  }

  function editarMensaje(msgId, inputEl, bubble, formEl) {
    const nuevoTexto = inputEl.value.trim();
    if (!nuevoTexto || !currentChatIdEca) return;
    fetch(`/mensajes/${currentChatIdEca}/mensajes/${msgId}/editar/`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': (document.querySelector('input[name=csrfmiddlewaretoken]') || {}).value || '',
      },
      credentials: 'same-origin',
      body: JSON.stringify({ texto: nuevoTexto })
    }).then(r => {
      if (r.ok) {
        bubble.querySelector('.mensaje-texto').textContent = nuevoTexto;
        formEl.classList.add('d-none');
        // Mostrar badge editado si no existe
        if (!bubble.querySelector('.badge-editado')) {
          const meta = bubble.querySelector('.chat-meta');
          const badge = document.createElement('span');
          badge.className = 'text-muted badge-editado ms-1';
          badge.style.fontSize = '.65rem';
          badge.textContent = '(editado)';
          meta.appendChild(badge);
        }
      } else {
        r.json().then(d => alert(d.texto || d.detail || 'Error al editar.'));
      }
    }).catch(() => alert('Error de conexión.'));
  }

  // --- Setup textarea ---
  (function() {
    var textarea = document.getElementById('chat-input-eca');
    var charCount = document.getElementById('chat-char-count-eca');
    var form = document.getElementById('chat-form-eca');
    if (!textarea) return;
    textarea.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.dispatchEvent(new Event('submit', { cancelable: true }));
      }
    });
    textarea.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      if (charCount) charCount.textContent = (this.value.length || 0) + '/500';
    });
  })();

  // ----- Enviar mensaje con envio optimista + fallback AJAX -----
  document.getElementById('chat-form-eca').addEventListener('submit', async function (e) {
    e.preventDefault();
    const input = document.getElementById('chat-input-eca');
    const msg = input.value.trim();
    if (!msg || !currentChatIdEca) return;
    input.disabled = true;
    var errorMsg = '';
    var optimista = crearBurbujaOptimistaEca(msg);
    input.value = '';
    input.style.height = '';
    if (document.getElementById('chat-char-count-eca')) document.getElementById('chat-char-count-eca').textContent = '0/500';

    if (currentWSEca && currentWSEca.readyState === 1) {
      try {
        currentWSEca.send(JSON.stringify({ message: msg }));
      } catch (err) {
        marcarOptimistaFallidoEca(optimista);
      }
    } else {
      try {
        const resp = await fetch('/mensajes/' + currentChatIdEca + '/mensajes/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': (document.querySelector('input[name=csrfmiddlewaretoken]') || {}).value || '',
          },
          credentials: 'same-origin',
          body: JSON.stringify({ texto: msg })
        });
        if (resp.ok) {
          removerBurbujasPendientesEca();
          cargarMensajesEca(currentChatIdEca);
        } else {
          marcarOptimistaFallidoEca(optimista);
          try {
            const data = await resp.json();
            errorMsg = data.texto || data.detail || 'Error al enviar mensaje';
          } catch {
            errorMsg = 'Error al enviar mensaje';
          }
        }
      } catch (err) {
        marcarOptimistaFallidoEca(optimista);
        errorMsg = 'Error al conectar con el servidor';
      }
    }
    input.disabled = false;
    if (errorMsg) {
      var errorDiv = document.createElement('div');
      errorDiv.className = 'text-danger small mt-2';
      errorDiv.innerHTML = errorMsg;
      document.getElementById('chat-form-eca').appendChild(errorDiv);
      setTimeout(function() { errorDiv.remove(); }, 3000);
    }
  });

  function marcarLeidosEca(chatId) {
    fetch('/mensajes/' + chatId + '/leer/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': (document.querySelector('input[name=csrfmiddlewaretoken]') || {}).value || '',
      },
      credentials: 'same-origin',
    }).catch(function() {});
  }

  // ----- Inicializar al cargar -----
  cargarChatsEca();
</script>
