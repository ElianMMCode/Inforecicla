{% load static %}
<div class="container-fluid p-0">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-bold text-success mb-0"><i class="bi bi-chat-dots-fill me-2"></i>Mensajes</h4>
            <small class="text-muted">Visualizá y respondé los mensajes de los ciudadanos hacia tu Punto ECA.</small>
        </div>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body py-4 px-3">
            <!-- Chat dashboard placeholder -->
            <div class="row g-0" style="min-height:350px;">
                <div class="col-12 text-center text-muted py-5">
                    <span class="d-inline-block mb-2">
                        <i class="bi bi-chat-left-text text-success" style="font-size:2rem;"></i>
                    </span>
                    <h6 class="fw-semibold mb-1">Acá verás tus chats con ciudadanos</h6>
                    <p class="text-muted small mb-0">En breve vas a poder gestionar y responder mensajes desde este panel.</p>
                </div>
            </div>
        </div>
    </div>
</div>
