{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crear Inventario - Panel Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h1 class="mb-4">Crear Inventario</h1>
      <form method="post" action="" novalidate>
        {% csrf_token %}
        <div class="mb-3">
          <label for="puntoEcaId" class="form-label">Punto ECA (ID)</label>
          <input id="puntoEcaId" class="form-control" name="puntoEcaId" required>
        </div>
        <div class="mb-3">
          <label for="materialId" class="form-label">Material (ID)</label>
          <input id="materialId" class="form-control" name="materialId" required>
        </div>
        <div class="mb-3">
          <label for="stockActual" class="form-label">Stock Actual</label>
          <input id="stockActual" class="form-control" name="stockActual" type="number" step="any">
        </div>
        <div class="mb-3">
          <label for="capacidadMaxima" class="form-label">Capacidad Máxima</label>
          <input id="capacidadMaxima" class="form-control" name="capacidadMaxima" type="number" step="any">
        </div>
        <div class="mb-3">
          <label for="precioCompra" class="form-label">Precio Compra</label>
          <input id="precioCompra" class="form-control" name="precioCompra" type="number" step="any">
        </div>
        <div class="d-flex gap-2">
          <a class="btn btn-secondary" href="/panel_admin/inventario/dashboard/">Cancelar</a>
          <button class="btn btn-success" type="submit">Crear Inventario</button>
        </div>
      </form>
    </div>
  </body>
</html>
