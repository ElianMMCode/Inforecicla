<style>
@page {
    size: A4 portrait;
    margin: 1.5cm 1.5cm 2.2cm 1.5cm;
    @bottom-center {
        content: "Página " counter(page);
        font-size: 7.5px;
        color: #555;
        font-family: Arial, sans-serif;
        border-top: 1px solid #c8e6c9;
        padding-top: 4px;
    }
    @bottom-right {
        content: "InfoRecicla — Panel de Administración";
        font-size: 7px;
        color: #999;
        font-family: Arial, sans-serif;
        padding-top: 4px;
    }
}

* { box-sizing: border-box; }
body { font-family: Arial, sans-serif; font-size: 9.5px; color: #1a1a1a; margin: 0; padding: 0; }

/* Header */
.pdf-header { display: flex; flex-direction: row; align-items: center; width: 100%; margin-bottom: 4px; }
.header-logo { flex: 0 0 22%; text-align: left; padding: 2px 6px; }
.header-logo img { display: block; height: 44px; margin-bottom: 2px; }
.header-logo .brand { font-size: 12px; font-weight: bold; color: #1a5c2a; }
.header-center { flex: 0 0 46%; text-align: center; padding: 2px 6px; }
.report-title { font-size: 15px; font-weight: bold; color: #1a5c2a; margin-bottom: 2px; }
.report-subtitle { font-size: 8.5px; color: #555; }
.header-right { flex: 0 0 32%; text-align: right; font-size: 8px; color: #444; line-height: 1.7; padding: 2px 6px; }
.header-divider { border: none; border-top: 2px solid #1a5c2a; margin: 5px 0 8px 0; }

/* Section header bars */
.section-header {
    background-color: #1a5c2a;
    color: white;
    font-weight: bold;
    font-size: 9px;
    padding: 5px 9px;
    margin-top: 10px;
    margin-bottom: 0;
    letter-spacing: 0.3px;
}

/* Ficha técnica */
.ficha-grid { width: 100%; border-collapse: collapse; border: 1px solid #c8e6c9; }
.ficha-grid th, .ficha-grid td { padding: 4px 9px; border-bottom: 1px solid #e0f2e9; font-size: 8.5px; }
.ficha-grid th { color: #1a5c2a; font-weight: bold; text-align: left; background: transparent; width: 20%; }
.ficha-grid tr:last-child th, .ficha-grid tr:last-child td { border-bottom: none; }

/* Data table */
.data-table { width: 100%; border-collapse: collapse; margin-top: 0; }
.data-table thead tr { background-color: #1a5c2a; color: white; }
.data-table thead th { padding: 5px 7px; text-align: left; font-size: 8.5px; font-weight: bold; }
.data-table tbody tr:nth-child(even) { background-color: #f0f9f4; }
.data-table tbody tr:nth-child(odd) { background-color: #ffffff; }
.data-table tbody td { padding: 4px 7px; border-bottom: 1px solid #d4edda; font-size: 8.5px; }

/* Resumen financiero — PDFs Gestor ECA */
.resumen-grid { width: 100%; border-collapse: collapse; border: 1px solid #c8e6c9; }
.resumen-grid thead th { padding: 5px 9px 3px 9px; font-size: 7.5px; color: #1a5c2a; font-weight: bold; text-align: left; background: #f0f9f4; border-right: 1px solid #c8e6c9; border-bottom: 1px solid #a5d6a7; }
.resumen-grid thead th:last-child { border-right: none; }
.resumen-grid tbody td, .resumen-grid tbody th { padding: 6px 9px; font-size: 8.5px; border-right: 1px solid #c8e6c9; vertical-align: top; }
.resumen-grid tbody td:last-child, .resumen-grid tbody th:last-child { border-right: none; }
.resumen-grid tbody th { color: #1a5c2a; font-weight: bold; text-align: left; background: transparent; }
.resumen-grid .val { font-size: 12px; font-weight: bold; color: #1a1a1a; }
.tfoot-total td { background: #e8f5e9; font-weight: bold; font-size: 9px; border-top: 2px solid #1a5c2a; }
.val-pos { color: #145a32; }
.val-neg { color: #922b21; }
.badge-compra { background: #fce4e4; color: #7b1818; }
.badge-venta  { background: #d1f5e0; color: #145a32; }
.row-compra td { border-left: 3px solid #e57373; }
.row-venta  td { border-left: 3px solid #66bb6a; }

/* Badges */
.badge { display: inline-block; padding: 2px 5px; border-radius: 3px; font-size: 7.5px; font-weight: bold; }
.badge-activo   { background: #d1f5e0; color: #145a32; }
.badge-inactivo { background: #fce4e4; color: #922b21; }
.badge-adm      { background: #2c3e50; color: #fff; }
.badge-ciu      { background: #d1f5e0; color: #145a32; }
.badge-geca     { background: #d0ebff; color: #0a3d62; }
.badge-otro     { background: #e8e8e8; color: #555; }
.badge-tipo     { background: #dbeafe; color: #1e3a8a; }
</style>
