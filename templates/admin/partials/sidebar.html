{% load static %}
<div class="sidebar-menu sidebar-fixed">
    <div class="mb-3" style="margin-bottom: 1.5rem !important; padding-left:12px; padding-right:12px;">
        <a href="{% url 'panel_admin:panel_admin' %}" class="d-flex flex-column align-items-center justify-content-center text-decoration-none" style="width:100%;">
            <img src="{% static 'img/logo.png' %}" alt="Logo InfoRecicla" class="rounded mb-2" width="56" height="56">
            <span class="fw-bold fs-4 text-white" style="letter-spacing:.5px;">InfoRecicla</span>
        </a>
    </div>
    <ul class="nav nav-pills flex-column" style="gap: 2px !important; margin-top: 0 !important;">
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center text-white {% if request.resolver_match.url_name == 'panel_admin' %}active{% endif %}" href="{% url 'panel_admin:panel_admin' %}">
                <i class="bi bi-speedometer2 me-2"></i> Inicio
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center text-white {% if '/panel_admin/usuarios' in request.path %}active{% endif %}" href="{% url 'panel_admin:listar_usuarios' %}">
                <i class="bi bi-people-fill me-2"></i> Usuarios
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center text-white {% if '/panel_admin/publicaciones' in request.path and '/categorias-publicaciones' not in request.path %}active{% endif %}" href="{% url 'panel_admin:listar_publicaciones_admin' %}">
                <i class="bi bi-newspaper me-2"></i> Publicaciones
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center text-white {% if '/panel_admin/categorias-publicaciones' in request.path %}active{% endif %}" href="{% url 'panel_admin:listar_categorias_publicacion_admin' %}">
                <i class="bi bi-folder-fill me-2"></i> Categorías de publicaciones
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center text-white {% if '/panel_admin/materiales' in request.path and '/categorias-materiales' not in request.path and '/tipos-materiales' not in request.path %}active{% endif %}" href="{% url 'panel_admin:gestion_materiales' %}?tab=materiales">
                <i class="bi bi-box-seam me-2"></i> Materiales
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center text-white {% if '/panel_admin/tipos-materiales' in request.path %}active{% endif %}" href="{% url 'panel_admin:gestion_materiales' %}?tab=tipos">
                <i class="bi bi-tags-fill me-2"></i> Tipos de materiales
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center text-white {% if '/panel_admin/categorias-materiales' in request.path %}active{% endif %}" href="{% url 'panel_admin:gestion_materiales' %}?tab=categorias">
                <i class="bi bi-archive-fill me-2"></i> Categorías de materiales
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center text-white {% if '/panel_admin/puntos-eca' in request.path %}active{% endif %}" href="{% url 'panel_admin:listar_puntos_eca_admin' %}">
                <i class="bi bi-geo-alt-fill me-2"></i> Puntos ECA
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center text-white {% if '/panel_admin/perfil' in request.path %}active{% endif %}" href="{% url 'panel_admin:perfil_admin' %}">
                <i class="bi bi-person-circle me-2"></i> Mi Perfil
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link d-flex align-items-center text-white" href="/inicio/">
                <i class="bi bi-house-door me-2"></i> Página principal
            </a>
        </li>
        <li class="nav-item">
            <form method="POST" action="/logout/" style="margin:0;padding:0;">
                {% csrf_token %}
                <button type="submit" class="nav-link d-flex align-items-center text-white bg-transparent border-0 w-100" style="text-align:left;">
                    <i class="bi bi-box-arrow-right me-2"></i> Cerrar sesión
                </button>
            </form>
        </li>
    </ul>
</div>
