{% load static %}
<script src="{% static 'js/admin/panel-modal-forms.js' %}"></script>
<script>
(function () {
  var form = document.getElementById('{{ form_id }}');
  if (!form) return;

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    e.stopPropagation();

    {% if check_passwords %}
    var p1 = document.getElementById('password');
    var p2 = document.getElementById('passwordConfirm');
    if (p1 && p2 && p1.value !== p2.value) {
      form.classList.add('was-validated');
      mostrarErroresSwal(['Las contraseñas no coinciden.']);
      return;
    }
    {% endif %}

    if (!form.checkValidity()) {
      form.classList.add('was-validated');
      var errs = [];
      var invalidFields = [];
      var campos = form.querySelectorAll('[required], [pattern]');
      for (var i = 0; i < campos.length; i++) {
        if (!campos[i].checkValidity()) {
          var msg = typeof _mensajeValidacionES === 'function' ? _mensajeValidacionES(campos[i]) : '';
          if (msg) {
            errs.push(msg);
            invalidFields.push({ field: campos[i], msg: msg });
          }
        }
      }
      var prom = mostrarErroresSwal(errs);
      if (prom && prom.then) {
        (function (inv) {
          prom.then(function () {
            for (var j = 0; j < inv.length; j++) {
              var item = inv[j];
              item.field.classList.add('is-invalid');
              var contenedor = item.field.closest('.col-12, .col-md-6, .col-md-12, .mb-3');
              if (contenedor) {
                var fb = contenedor.querySelector('.invalid-feedback');
                if (fb) fb.textContent = item.msg;
              }
            }
          });
        })(invalidFields);
      }
      return;
    }

    form.classList.add('was-validated');
    Swal.fire({
      icon: 'question', title: '¿Guardar cambios?', showCancelButton: true,
      confirmButtonText: 'Sí, guardar', cancelButtonText: 'Cancelar',
      confirmButtonColor: '#198754', cancelButtonColor: '#6c757d'
    }).then(function (r) { if (r.isConfirmed) form.submit(); });
  });

  form.addEventListener('invalid', function (e) { e.preventDefault(); }, true);

  var campos = form.querySelectorAll('input, select, textarea');
  for (var i = 0; i < campos.length; i++) {
    (function (campo) {
      var eventName = campo.tagName === 'SELECT' ? 'change' : 'input';
      campo.addEventListener(eventName, function () {
        campo.classList.toggle('is-valid', campo.checkValidity() && campo.value.trim() !== '');
        campo.classList.toggle('is-invalid', !campo.checkValidity() && (campo.value.trim() !== '' || campo.required));
      });
      campo.addEventListener('blur', function () {
        campo.classList.toggle('is-valid', campo.checkValidity() && campo.value.trim() !== '');
        campo.classList.toggle('is-invalid', !campo.checkValidity() && (campo.value.trim() !== '' || campo.required));
      });
    })(campos[i]);
  }
})();
</script>
{% include "admin/_messages_swal.html" %}
