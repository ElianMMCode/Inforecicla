<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar Punto ECA - InfoRecicla</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>
<body class="bg-light m-0 pt-5 pt-md-0">

<div class="container-fluid px-0">
    <div class="row g-0">

        <aside class="d-none d-md-flex col-md-2 position-fixed top-0 start-0 vh-100 bg-success text-white p-3 flex-column z-3 shadow-sm">
            <a class="navbar-brand d-flex align-items-center gap-2 text-white mb-3 text-decoration-none" href="../admin.html">
                <img src="../../resources/static/imagenes/logo.png" alt="Logo" width="48" height="48" class="rounded bg-white p-1">
                <div class="d-flex flex-column lh-sm">
                    <span class="fw-semibold">InfoRecicla</span>
                    <small class="text-white-50">Administración</small>
                </div>
            </a>
            <nav class="w-100" role="navigation">
                <ul class="nav nav-pills flex-column gap-2 w-100 m-0 p-0 list-unstyled">
                    <li class="nav-item"><a href="indexPuntoECA.html" class="nav-link text-white"><i class="bi bi-speedometer2 me-2"></i>Resumen</a></li>
                    <li class="nav-item"><a href="listPuntoECA.html" class="nav-link bg-white text-success fw-semibold border-start border-4 border-success rounded-start"><i class="bi bi-list me-2"></i>Ver puntos</a></li>
                    <li class="nav-item"><a href="createPuntoECA.html" class="nav-link text-white"><i class="bi bi-plus-circle me-2"></i>Crear punto</a></li>
                    <li class="nav-item mt-2 border-top border-white-50 pt-3"><a href="../admin.html" class="nav-link text-white"><i class="bi bi-house me-2"></i>Volver al Dashboard</a></li>
                </ul>
            </nav>
        </aside>

        <div class="d-md-none w-100 bg-success py-2 fixed-top z-3 shadow-sm">
            <div class="d-flex align-items-center justify-content-between px-3">
                <a class="navbar-brand d-flex align-items-center gap-2 text-white text-decoration-none" href="../admin.html">
                    <i class="bi bi-recycle fs-3"></i>
                    <span class="fw-semibold">InfoRecicla</span>
                </a>
                <a class="text-white text-decoration-none" href="../admin.html"><i class="bi bi-house fs-5"></i></a>
            </div>
            <nav class="mt-2">
                <ul class="nav nav-pills flex-row gap-2 overflow-auto px-3 pb-2 flex-nowrap">
                    <li class="nav-item"><a class="nav-link text-white text-nowrap" href="indexPuntoECA.html">Resumen</a></li>
                    <li class="nav-item"><a class="nav-link bg-white text-success fw-semibold border-bottom border-3 border-success rounded-bottom text-nowrap" href="listPuntoECA.html">Puntos</a></li>
                    <li class="nav-item"><a class="nav-link text-white text-nowrap" href="createPuntoECA.html">Crear</a></li>
                </ul>
            </nav>
        </div>

        <main class="col offset-md-2 p-4">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
        <div>
            <h1 class="h2 fw-bold text-success mb-1"><i class="fas fa-edit me-2"></i>Editar Punto ECA</h1>
            <p class="text-muted mb-0">Actualiza los datos de la estación</p>
        </div>
        <a href="lista.html" class="btn btn-outline-secondary d-none d-sm-block">
            <i class="fas fa-arrow-left me-1"></i> Volver a la lista
        </a>
    </div>

    <div class="card border-success shadow-sm mb-5">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0"><i class="fas fa-building me-2"></i>Información de la Estación</h5>
        </div>
        <div class="card-body bg-light p-4">
            <form class="needs-validation" novalidate>
                
                <div class="row g-3 mb-2">
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Nombre del Punto ECA <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" value="ECA Centro Verde" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-semibold">NIT (opcional)</label>
                        <input type="text" class="form-control" value="900123456-7">
                    </div>
                </div>

                <div class="row g-3 mb-2">
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Horario de atención (opcional)</label>
                        <input type="text" class="form-control" value="Lun-Vie 8:00–17:00, Sáb 9:00–13:00">
                    </div>
                </div>

                <div class="row g-3 mb-2">
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Correo de contacto del punto <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" value="contacto@ecacentroverde.com" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Teléfono de contacto <span class="text-danger">*</span></label>
                        <input type="tel" class="form-control" value="3001234567" required>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Dirección del punto <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" value="Calle 45 # 12-34" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-semibold">Ciudad <span class="text-danger">*</span></label>
                        <select class="form-select" required>
                            <option value="Bogotá" selected>Bogotá</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-semibold">Localidad <span class="text-danger">*</span></label>
                        <select class="form-select" required>
                            <option value="Chapinero" selected>Chapinero</option>
                            <option value="Usaquén">Usaquén</option>
                            <option value="Suba">Suba</option>
                        </select>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold text-danger">Estado del Punto ECA <span class="text-danger">*</span></label>
                        <select class="form-select border-danger" required>
                            <option value="activo" selected>Activo</option>
                            <option value="inactivo">Inactivo</option>
                            <option value="bloqueado">Bloqueado</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4 p-3 bg-white border rounded">
                    <label class="form-label small fw-semibold mb-2"><i class="fas fa-map-marked-alt text-success me-2"></i>Ubicación GPS</label>
                    <div class="row g-2 align-items-center">
                        <div class="col-12 col-md-4">
                            <div class="input-group">
                                <span class="input-group-text bg-light">Lat</span>
                                <input type="text" class="form-control" value="4.630010">
                            </div>
                        </div>
                        <div class="col-12 col-md-4">
                            <div class="input-group">
                                <span class="input-group-text bg-light">Lng</span>
                                <input type="text" class="form-control" value="-74.065430">
                            </div>
                        </div>
                        <div class="col-12 col-md-4 d-grid">
                            <button type="button" class="btn btn-outline-success"><i class="fas fa-location-arrow me-1"></i> Actualizar GPS</button>
                        </div>
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="mostrarMapa" checked>
                    <label class="form-check-label small text-muted" for="mostrarMapa">Mostrar el punto en el mapa público.</label>
                </div>

                <div class="d-flex justify-content-end gap-2 pt-3 border-top">
                    <a href="detalles.html" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i> Actualizar Punto ECA</button>
                </div>
            </form>
        </div>
    </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
