<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar Punto ECA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4">
  <h1 class="h3 mb-3 text-success">Editar Punto ECA</h1>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="post" action="{% url 'panel_admin:editar_punto_eca_admin' punto.id %}" class="card border-success shadow-sm">
    {% csrf_token %}
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" name="nombre" value="{{ punto.nombre }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Estado</label>
          <select class="form-select" name="estado" required>
            {% for value, label in estados %}
              <option value="{{ value }}" {% if punto.estado == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" value="{{ punto.email|default:'' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Celular</label>
          <input type="text" class="form-control" name="celular" value="{{ punto.celular|default:'' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Teléfono fijo</label>
          <input type="text" class="form-control" name="telefono_punto" value="{{ punto.telefono_punto|default:'' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Horario</label>
          <input type="text" class="form-control" name="horario_atencion" value="{{ punto.horario_atencion|default:'' }}">
        </div>
        <div class="col-12">
          <label class="form-label">Dirección</label>
          <input type="text" class="form-control" name="direccion" value="{{ punto.direccion|default:'' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Localidad</label>
          <select class="form-select" name="localidad_id">
            <option value="">Sin localidad</option>
            {% for localidad in localidades %}
              <option value="{{ localidad.localidad_id }}" {% if punto.localidad and punto.localidad.localidad_id == localidad.localidad_id %}selected{% endif %}>{{ localidad.nombre }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Latitud</label>
          <input type="text" class="form-control" name="latitud" value="{{ punto.latitud|default:'' }}">
        </div>
        <div class="col-md-3">
          <label class="form-label">Longitud</label>
          <input type="text" class="form-control" name="longitud" value="{{ punto.longitud|default:'' }}">
        </div>
        <div class="col-12">
          <label class="form-label">Sitio web</label>
          <input type="text" class="form-control" name="sitio_web" value="{{ punto.sitio_web|default:'' }}">
        </div>
        <div class="col-12">
          <label class="form-label">Logo URL</label>
          <input type="text" class="form-control" name="logo_url_punto" value="{{ punto.logo_url_punto|default:'' }}">
        </div>
        <div class="col-12">
          <label class="form-label">Descripción</label>
          <textarea class="form-control" name="descripcion" rows="3">{{ punto.descripcion|default:'' }}</textarea>
        </div>
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-success">Guardar cambios</button>
        <a href="{% url 'panel_admin:listar_puntos_eca_admin' %}" class="btn btn-outline-secondary">Volver al Listado</a>
      </div>
    </div>
  </form>
</main>
</body>
</html>
