{% if messages %}
  {% for first_message in messages %}
    {% if forloop.first %}
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof Swal === "undefined") {
        return;
      }

      Swal.fire({
        icon: "{{ first_message.tags|default:'info' }}",
        title: "{{ first_message.tags|capfirst|default:'Mensaje'|escapejs }}",
        text: "{{ first_message|escapejs }}",
        confirmButtonColor: "#198754",
      });
    });
  </script>
    {% endif %}
  {% endfor %}
{% endif %}
