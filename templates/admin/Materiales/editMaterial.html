<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar Material</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4">
  <h1 class="h3 mb-3 text-success">Editar Material</h1>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="post" action="{% url 'panel_admin:editar_material_admin' material.id %}" class="card border-success shadow-sm">
    {% csrf_token %}
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" name="nombre" value="{{ material.nombre }}" maxlength="30" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Estado</label>
          <select class="form-select" name="estado" required>
            {% for value, label in estados %}
              <option value="{{ value }}" {% if material.estado == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">Descripción</label>
          <textarea class="form-control" name="descripcion" rows="3">{{ material.descripcion|default:'' }}</textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Categoría</label>
          <select class="form-select" name="categoria_id">
            <option value="">Sin categoría</option>
            {% for categoria in categorias %}
              <option value="{{ categoria.id }}" {% if material.categoria and material.categoria.id == categoria.id %}selected{% endif %}>{{ categoria.nombre }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Tipo</label>
          <select class="form-select" name="tipo_id">
            <option value="">Sin tipo</option>
            {% for tipo in tipos %}
              <option value="{{ tipo.id }}" {% if material.tipo and material.tipo.id == tipo.id %}selected{% endif %}>{{ tipo.nombre }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">URL imagen</label>
          <input type="url" class="form-control" name="imagen_url" value="{{ material.imagen_url|default:'' }}">
        </div>
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-success">Guardar cambios</button>
        <a href="{% url 'panel_admin:listar_materiales_admin' %}" class="btn btn-outline-secondary">Volver al Listado</a>
      </div>
    </div>
  </form>
</main>
</body>
</html>
