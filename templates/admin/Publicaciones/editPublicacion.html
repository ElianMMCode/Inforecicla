<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar Publicación</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4">
  <h1 class="h3 mb-3 text-success">Editar Publicación</h1>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="post" action="{% url 'panel_admin:editar_publicacion_admin' publicacion.id %}" class="card border-success shadow-sm">
    {% csrf_token %}
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Título</label>
        <input type="text" class="form-control" name="titulo" value="{{ publicacion.titulo }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Estado</label>
        <select class="form-select" name="estado" required>
          {% for value, label in estados %}
            <option value="{{ value }}" {% if publicacion.estado == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Categoría</label>
        <select class="form-select" name="categoria_id">
          <option value="">Sin categoría</option>
          {% for categoria in categorias %}
            <option value="{{ categoria.id }}" {% if publicacion.categoria and publicacion.categoria.id == categoria.id %}selected{% endif %}>{{ categoria.get_tipo_display }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" class="btn btn-success">Guardar cambios</button>
      <a href="{% url 'panel_admin:listar_publicaciones_admin' %}" class="btn btn-outline-secondary">Volver al Listado</a>
    </div>
  </form>
</main>
</body>
</html>
