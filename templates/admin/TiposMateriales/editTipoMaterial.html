{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar Tipo de Material</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4">
  <h1 class="h3 mb-3 text-success">Editar Tipo de Material</h1>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="post" action="{% url 'panel_admin:editar_tipo_material_admin' tipo.id %}" class="card border-success shadow-sm">
    {% csrf_token %}
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" name="nombre" value="{{ tipo.nombre }}" maxlength="30" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Descripción</label>
        <textarea class="form-control" name="descripcion" rows="3">{{ tipo.descripcion|default:'' }}</textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Estado</label>
        <select class="form-select" name="estado" required>
          {% for value, label in estados %}
            <option value="{{ value }}" {% if tipo.estado == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" class="btn btn-success">Guardar cambios</button>
      <a href="{% url 'panel_admin:listar_tipos_material_admin' %}" class="btn btn-outline-secondary">Volver al Listado</a>
    </div>
  </form>
</main>
</body>
</html>
