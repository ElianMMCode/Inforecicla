{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar Tipo Material - InfoRecicla Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

{% include "admin/partials/sidebar.html" with active="tipos" %}

<main class="col offset-md-2 p-4">
  {% if messages %}
  <div class="mb-3">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show">
      {{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <div class="mb-4 d-flex justify-content-between align-items-center">
    <div>
      <h1 class="h2 fw-bold text-success mb-1"><i class="bi bi-pencil me-2"></i>Editar Tipo de Material</h1>
      <p class="text-muted mb-0">{{ tipo.nombre }}</p>
    </div>
    <a href="{% url 'panel_admin:listar_tipos_material_admin' %}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i> Volver
    </a>
  </div>

  <div class="card shadow-sm border-0" style="max-width: 600px;">
    <div class="card-header bg-success text-white"><i class="bi bi-recycle me-1"></i> Formulario</div>
    <div class="card-body p-4">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
          <input type="text" name="nombre" class="form-control" value="{{ tipo.nombre }}" required maxlength="30">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Descripción</label>
          <textarea name="descripcion" class="form-control" rows="3" maxlength="500">{{ tipo.descripcion|default:'' }}</textarea>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Estado</label>
          <select name="estado" class="form-select">
            {% for val, label in estados %}
              <option value="{{ val }}" {% if tipo.estado == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success">
            <i class="bi bi-save me-1"></i> Guardar Cambios
          </button>
          <a href="{% url 'panel_admin:listar_tipos_material_admin' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
