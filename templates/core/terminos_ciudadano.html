{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Términos y Condiciones - InfoRecicla</title>
    <link rel="icon" type="image/png" href="{% static 'img/logo.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" integrity="sha384-4LISF5TTJX/fLmGSxO53rV4miRxdg84mZsxmO8Rx5jGtp/LbrixFETvWa5a6sESd" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/sidebar.css' %}">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; }
        {% include 'partials/_terminos_css.html' %}
    </style>
</head>
<body>
<div class="d-flex min-vh-100">
    <nav class="sidebar sidebar-nav bg-success text-white p-3 d-none d-md-flex flex-column">
        {% include 'users/_sidebar.html' %}
    </nav>
    {% include 'partials/sidebar_offcanvas_ciudadano.html' %}
    <div class="flex-grow-1 d-flex flex-column" style="min-width:0;">
        <div class="d-md-none d-flex align-items-center bg-success px-3 py-2 shadow position-sticky top-0" style="z-index:1045;">
            <button id="btn-menu-toggle" class="btn btn-link text-white px-0 me-3" style="font-size:1.8rem;" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">

                <span class="visually-hidden">Abrir menú</span>
            </button>
            <span class="fw-semibold">InfoRecicla</span>
        </div>
        <header class="bg-white border-bottom shadow-sm sticky-top d-none d-md-block">

                <div class="row align-items-center">
                    <div class="col">
                        <h2 class="mb-0 text-success fw-bold">Términos y Condiciones</h2>
                    </div>
                </div>
            </div>
        </header>
        <section class="container py-5 legal-section" style="max-width: 820px;">
            <h1 class="mb-2 text-success">Términos y Condiciones</h1>
            <p class="text-body-secondary mb-4">Última actualización: junio de 2026</p>
