{% if request.user.is_authenticated and request.user.tipo_usuario == 'CIU' and not request.user.completo_tutorial %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css"/>
<script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.iife.js"></script>
<script>
(function() {
    var driver = window.driver.js.driver;
    var STORAGE_KEY = 'tutorial_ciu_pub';

    function notificarServidor() {
        fetch("{% url 'marcar_tutorial_visto' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            }
        }).catch(function(e) { console.error("Error al notificar tutorial:", e); });
    }

    function checkAllToursDone() {
        var keys = ['tutorial_ciu_datos', 'tutorial_ciu_comentarios', 'tutorial_ciu_chat', 'tutorial_ciu_guardados', 'tutorial_ciu_mapa', 'tutorial_ciu_pub'];
        var allDone = keys.every(function(k) { return localStorage.getItem(k) === '1'; });
        if (allDone) {
            notificarServidor();
        }
    }

    try {
        if (localStorage.getItem(STORAGE_KEY) === '1') return;
        localStorage.setItem(STORAGE_KEY, '1');

        var steps = [];

        var volver = document.getElementById('btn-volver-publicaciones');
        if (volver) {
            steps.push({ element: '#btn-volver-publicaciones', popover: { title: 'Volver', description: 'Regresá al listado completo de publicaciones.', side: 'bottom' } });
        }

        var youtube = document.getElementById('btn-ver-youtube');
        if (youtube) {
            steps.push({ element: '#btn-ver-youtube', popover: { title: 'Ver en YouTube', description: 'Abrí el video en YouTube para verlo en pantalla completa.', side: 'bottom' } });
        }

        var carruselPub = document.getElementById('carruselPublicacion');
        if (carruselPub) {
            steps.push({ element: '#carruselPublicacion', popover: { title: 'Galería de Imágenes', description: 'Deslizá para ver todas las imágenes de la publicación.', side: 'top' } });
        }

        var carruselDest = document.getElementById('carruselDestacadas');
        if (carruselDest) {
            steps.push({ element: '#carruselDestacadas', popover: { title: 'Publicaciones Destacadas', description: 'Las noticias más importantes seleccionadas por InfoRecicla.', side: 'bottom' } });
        }

        var likeBtn = document.getElementById('btn-like');
        if (likeBtn) {
            steps.push({ element: '#btn-like', popover: { title: 'Me Gusta', description: 'Indicá que te gustó la publicación. Podés cambiar tu voto en cualquier momento.', side: 'bottom' } });
        }

        var dislikeBtn = document.getElementById('btn-dislike');
        if (dislikeBtn) {
            steps.push({ element: '#btn-dislike', popover: { title: 'No Me Gusta', description: 'Expresá tu opinión negativa sobre la publicación.', side: 'bottom' } });
        }

        var guardarBtn = document.getElementById('btn-guardar-publicacion');
        if (guardarBtn) {
            steps.push({ element: '#btn-guardar-publicacion', popover: { title: 'Guardar', description: 'Guardá esta publicación para leerla después desde tu perfil.', side: 'bottom' } });
        }

        var buscar = document.getElementById('filtro-buscar');
        if (buscar) {
            steps.push({ element: '#filtro-buscar', popover: { title: 'Buscar', description: 'Encontrá publicaciones por palabra clave.', side: 'bottom' } });
        }

        var categoria = document.getElementById('filtro-categoria');
        if (categoria) {
            steps.push({ element: '#filtro-categoria', popover: { title: 'Categoría', description: 'Filtrá publicaciones por categoría temática.', side: 'bottom' } });
        }

        var checkbox = document.getElementById('filtro-destacados');
        if (checkbox) {
            steps.push({ element: '#filtro-destacados', popover: { title: 'Solo Destacados', description: 'Mostrá únicamente las publicaciones destacadas por el equipo.', side: 'bottom' } });
        }

        var filtrarBtn = document.getElementById('btn-filtrar');
        if (filtrarBtn) {
            steps.push({ element: '#btn-filtrar', popover: { title: 'Filtrar', description: 'Aplicá los filtros seleccionados para refinar la búsqueda.', side: 'bottom' } });
        }

        var grid = document.getElementById('grid-publicaciones');
        if (grid) {
            steps.push({ element: '#grid-publicaciones', popover: { title: 'Publicaciones', description: 'Cada tarjeta te lleva al detalle de la publicación.', side: 'top' } });
        }

        var cargarMas = document.getElementById('btn-cargar-mas');
        if (cargarMas) {
            steps.push({ element: '#btn-cargar-mas', popover: { title: 'Cargar Más', description: 'Mostrá más publicaciones a medida que las necesitás.', side: 'top' } });
        }

        var comentarioTexto = document.getElementById('comentario-texto');
        if (comentarioTexto) {
            steps.push({ element: '#comentario-texto', popover: { title: 'Escribir Comentario', description: 'Dejá tu opinión sobre la publicación.', side: 'top' } });
        }

        var comentarBtn = document.getElementById('btn-comentar');
        if (comentarBtn) {
            steps.push({ element: '#btn-comentar', popover: { title: 'Publicar Comentario', description: 'Presioná para enviar tu comentario.', side: 'right' } });
        }

        var editarBtn = document.querySelector('[id^="btn-editar-comentario-"]');
        if (editarBtn) {
            steps.push({ element: '#' + editarBtn.id, popover: { title: 'Editar Comentario', description: 'Modificá el texto de tu comentario.', side: 'bottom' } });
        }

        var eliminarBtn = document.querySelector('[id^="btn-eliminar-comentario-"]');
        if (eliminarBtn) {
            steps.push({ element: '#' + eliminarBtn.id, popover: { title: 'Eliminar Comentario', description: 'Eliminá tu comentario de la publicación.', side: 'bottom' } });
        }

        if (steps.length) {
            var tourDriver = driver({
                showProgress: true,
                nextBtnText: 'Siguiente',
                prevBtnText: 'Anterior',
                doneBtnText: 'Entendido',
                onDestroyed: function() { checkAllToursDone(); },
                steps: steps
            });
            tourDriver.drive();
        } else {
            checkAllToursDone();
        }
    } catch(e) {}
})();
</script>
{% endif %}
